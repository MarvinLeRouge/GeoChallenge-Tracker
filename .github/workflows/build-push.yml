deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      OWNER_LC: ${{ needs.build.outputs.owner_lc }}
      REPO_LC: ${{ needs.build.outputs.repo_lc }}
      SHA_TAG: sha-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy tiles nginx config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "ops/nginx/*"
          target: "/home/mlr/marvinlerouge.dev/gc-tracker/shared/"
          strip_components: 0
          timeout: 2m
          command_timeout: 10m
          overwrite: true

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "ops/deploy/docker-compose.yml"
          target: "/home/mlr/marvinlerouge.dev/gc-tracker/compose/"
          strip_components: 2
          timeout: 2m
          command_timeout: 10m
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -Eeuo pipefail
            echo "== whoami ==" && whoami
            echo "== date ==" && date -Is

            cd /home/mlr/marvinlerouge.dev/gc-tracker/compose

            echo "== pull images =="
            docker compose --env-file ../shared/env/app.env pull

            echo "== up -d =="
name: Build, Push & Deploy

on:
  # Triggered automatically when CI passes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Manual trigger — bypasses CI gate (hotfixes, rollbacks, redeploys)
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Build Docker images and push to GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    # On workflow_run: only proceed if CI succeeded
    # On workflow_dispatch: always proceed
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      head_sha: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Resolve commit SHA
        id: meta
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "tag=sha-${SHA::7}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/marvinlerouge/geochallenge-tracker/backend:${{ steps.meta.outputs.tag }}
            ghcr.io/marvinlerouge/geochallenge-tracker/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/marvinlerouge/geochallenge-tracker/frontend:${{ steps.meta.outputs.tag }}
            ghcr.io/marvinlerouge/geochallenge-tracker/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 2 — Deploy to production server over SSH
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GITHUB_SHA: ${{ needs.build-and-push.outputs.head_sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_PATH: /home/mlr/marvinlerouge.dev/gc-tracker/compose
          SHARED_PATH: /home/mlr/marvinlerouge.dev/gc-tracker/shared
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG,GITHUB_SHA,GITHUB_REPOSITORY,DEPLOY_PATH,SHARED_PATH
          script_stop: true
          script: |
            set -Eeuo pipefail

            echo "==> Authenticate to GHCR"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            REPO_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}"
            REGISTRY="ghcr.io/${GITHUB_REPOSITORY,,}"

            echo "==> Fetch docker-compose.yml (commit: ${GITHUB_SHA})"
            curl -fsSL "${REPO_URL}/ops/deploy/docker-compose.yml" \
              -o "${DEPLOY_PATH}/docker-compose.yml"

            echo "==> Fetch nginx config files"
            mkdir -p "${SHARED_PATH}/ops/nginx/www/tiles"
            curl -fsSL "${REPO_URL}/ops/nginx/tiles.conf" \
              -o "${SHARED_PATH}/ops/nginx/tiles.conf"
            curl -fsSL "${REPO_URL}/ops/nginx/www/tiles/_health.png" \
              -o "${SHARED_PATH}/ops/nginx/www/tiles/_health.png"

            cd "${DEPLOY_PATH}"

            echo "==> Pull images (tag: ${IMAGE_TAG})"
            IMAGE_BACKEND="${REGISTRY}/backend:${IMAGE_TAG}" \
            IMAGE_FRONTEND="${REGISTRY}/frontend:${IMAGE_TAG}" \
            docker compose --env-file ../shared/env/app.env pull

            echo "==> Redeploy stack"
            IMAGE_BACKEND="${REGISTRY}/backend:${IMAGE_TAG}" \
            IMAGE_FRONTEND="${REGISTRY}/frontend:${IMAGE_TAG}" \
            docker compose --env-file ../shared/env/app.env up -d --remove-orphans

            echo "==> Stack status"
            docker compose --env-file ../shared/env/app.env ps

services:
  backend:
    image: ${IMAGE_BACKEND}
    container_name: geo-backend
    restart: unless-stopped
    env_file:
      - ../shared/env/app.env
      - ../shared/env/secrets.env
    depends_on:
      - mailhog
    volumes:
      - ../shared/backups:/backups
      - ../shared/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.gctracker-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.gctracker-api.entrypoints=websecure"
      - "traefik.http.routers.gctracker-api.tls=true"
      - "traefik.http.routers.gctracker-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gctracker-api.middlewares=gctracker-strip-api"
      - "traefik.http.routers.gctracker-api.service=gctracker-backend"
      - "traefik.http.middlewares.gctracker-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.services.gctracker-backend.loadbalancer.server.port=8000"
    networks:
      - traefik-public
      - internal

  frontend:
    image: ${IMAGE_FRONTEND}
    container_name: geo-frontend
    restart: unless-stopped
    env_file:
      - ../shared/env/app.env
    depends_on:
      - backend
      - tiles
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.gctracker-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.gctracker-frontend.entrypoints=websecure"
      - "traefik.http.routers.gctracker-frontend.tls=true"
      - "traefik.http.routers.gctracker-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.gctracker-frontend.loadbalancer.server.port=80"
    networks:
      - traefik-public

  tiles:
    image: nginx:1.25-alpine
    container_name: geo-tiles
    restart: unless-stopped
    command: |
      sh -c "
        rm -f /etc/nginx/conf.d/default.conf &&
        mkdir -p /var/log/nginx /var/cache/nginx/tiles_cache &&
        nginx -g 'daemon off;'
      "
    volumes:
      - ../shared/ops/nginx/tiles.conf:/etc/nginx/conf.d/tiles.conf:ro
      - ../shared/ops/nginx/www:/var/www:ro
      - tiles_cache:/var/cache/nginx/tiles_cache
      - tiles_logs:/var/log/nginx
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/tiles/_health.png || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.gctracker-tiles.rule=Host(`${DOMAIN}`) && PathPrefix(`/tiles`)"
      - "traefik.http.routers.gctracker-tiles.entrypoints=websecure"
      - "traefik.http.routers.gctracker-tiles.tls=true"
      - "traefik.http.routers.gctracker-tiles.tls.certresolver=letsencrypt"
      - "traefik.http.services.gctracker-tiles.loadbalancer.server.port=80"
    networks:
      - traefik-public

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: geo-mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - internal

volumes:
  tiles_cache:
    driver: local
  tiles_logs:
    driver: local

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geo-backend
    env_file:
      - .env
    environment:
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_URI_TPL=${MONGODB_URI_TPL}
      - MONGODB_DB=${MONGODB_DB}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - BACKUP_DIR=/backups
    depends_on:
      - maildev
    volumes:
      - ./backend:/app
      - ./backups:/backups
      - ./uploads:/uploads
      - ./backend/data/samples:/app/data/samples
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.gctracker-api-dev.rule=Host(`gc-tracker.marvinlerouge.local`) && PathPrefix(`/api`)"
      - "traefik.http.routers.gctracker-api-dev.entrypoints=web"
      - "traefik.http.routers.gctracker-api-dev.middlewares=gctracker-strip-api-dev"
      - "traefik.http.routers.gctracker-api-dev.service=gctracker-backend-dev"
      - "traefik.http.middlewares.gctracker-strip-api-dev.stripprefix.prefixes=/api"
      - "traefik.http.services.gctracker-backend-dev.loadbalancer.server.port=8000"
    networks:
      - traefik-public
      - internal

  maildev:
    container_name: geo-maildev
    image: maildev/maildev
    ports:
      - "127.0.0.1:1080:1080"
      - "127.0.0.1:1025:1025"
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: ${DOCKER_TARGET:-dev}
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_TILE_URL: ${VITE_TILE_URL:-/tiles/{z}/{x}/{y}.png}
    container_name: geo-frontend
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-true}
      - VITE_API_URL=${VITE_API_URL:-/api}
      - VITE_TILE_URL=${VITE_TILE_URL:-/tiles/{z}/{x}/{y}.png}
    depends_on:
      - backend
      - tiles
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.gctracker-frontend-dev.rule=Host(`gc-tracker.marvinlerouge.local`)"
      - "traefik.http.routers.gctracker-frontend-dev.entrypoints=web"
      - "traefik.http.services.gctracker-frontend-dev.loadbalancer.server.port=5173"
    networks:
      - traefik-public

  tiles:
    image: nginx:1.25-alpine
    container_name: geo-tiles
    restart: unless-stopped
    command: |
      sh -c "
        rm -f /etc/nginx/conf.d/default.conf &&
        mkdir -p /var/log/nginx /var/cache/nginx/tiles_cache &&
        nginx -g 'daemon off;'
      "
    volumes:
      - ./ops/nginx/tiles.conf:/etc/nginx/conf.d/tiles.conf:ro
      - ./ops/nginx/www:/var/www:ro
      - tiles_cache:/var/cache/nginx/tiles_cache
      - tiles_logs:/var/log/nginx
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/tiles/_health.png || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.gctracker-tiles-dev.rule=Host(`gc-tracker.marvinlerouge.local`) && PathPrefix(`/tiles`)"
      - "traefik.http.routers.gctracker-tiles-dev.entrypoints=web"
      - "traefik.http.services.gctracker-tiles-dev.loadbalancer.server.port=80"
    networks:
      - traefik-public

volumes:
  tiles_cache:
    driver: local
  tiles_logs:
    driver: local

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge

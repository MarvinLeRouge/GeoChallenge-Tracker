# ---------------------------
# 🧱 docker-compose.yml (optimisé dev/prod)
# ---------------------------
#
# ⚠️  BASE DE DONNÉES : MongoDB Atlas (externe)
#     Ce projet utilise MongoDB Atlas — aucun service mongo n'est déclaré ici.
#     Configurer MONGODB_URI_TPL, MONGODB_USER et MONGODB_PASSWORD dans .env
#     avant de démarrer les services.
#
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geo-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_URI_TPL=${MONGODB_URI_TPL}
      - MONGODB_DB=${MONGODB_DB}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - BACKUP_DIR=/backups
    depends_on:
      - maildev
    volumes:
      - ./backend:/app
      - ./backups:/backups
      - ./uploads:/uploads
      - ./backend/data/samples:/app/data/samples
    restart: unless-stopped

  maildev:
    container_name: geo-maildev
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    restart: unless-stopped

  # --- Frontend unifié avec variable d'environnement ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-dev}
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_TILE_URL: ${VITE_TILE_URL:-/tiles/{z}/{x}/{y}.png}
    container_name: geo-frontend
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-true}
      - VITE_API_URL=${VITE_API_URL:-/api}
      - VITE_TILE_URL=${VITE_TILE_URL:-/tiles/{z}/{x}/{y}.png}
    depends_on:
      - backend
      - tiles
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_INTERNAL_PORT:-5173}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # --- Service tiles (commun dev/prod) ---
  tiles:
    image: nginx:1.25-alpine
    container_name: geo-tiles
    restart: unless-stopped
    command: |
      sh -c "
        rm -f /etc/nginx/conf.d/default.conf &&
        mkdir -p /var/log/nginx /var/cache/nginx/tiles_cache &&
        nginx -g 'daemon off;'
      "
    volumes:
      # Configuration optimisée
      - ./ops/nginx/tiles.conf:/etc/nginx/conf.d/tiles.conf:ro
      # Santé + assets locaux
      - ./ops/nginx/www:/var/www:ro
      # Cache persistant avec permissions
      - tiles_cache:/var/cache/nginx/tiles_cache
      # Logs pour debug
      - tiles_logs:/var/log/nginx
    ports:
      - "8080:80"
    # Limite mémoire pour éviter les fuites
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # Santé du conteneur
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/tiles/_health.png || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  tiles_cache:
    driver: local
  tiles_logs:
    driver: local

# --- Commandes rapides ---
# Développement: docker-compose --profile dev up -d
# Production:    docker-compose --profile prod up -d
# Les deux:      docker-compose --profile dev --profile prod up -d
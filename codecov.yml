flag_management:
  default_rules:
    after_n_builds: 1

flags:
  frontend:
    paths:
      - src/
  backend:
    paths:
      - backend/

ignore:
  # Namespace files — no logic to cover
  - "**/__init__.py"
  # App entry point — startup wiring, not unit-testable
  - "backend/app/main.py"
  # Seed & index scripts — DDL / fixture data, not business logic
  - "backend/app/db/seed_data.py"
  - "backend/app/db/seed_indexes.py"
  # Infrastructure config — constants and logging setup
  - "backend/app/core/logging_config.py"
  - "backend/app/core/backup_config.py"

coverage:
  status:
    project:
      default:
        enabled: true
        target: 90%
        threshold: 1%
        informational: false
    patch:
      default:
        enabled: true
        target: 95%
        threshold: 5%
        informational: false

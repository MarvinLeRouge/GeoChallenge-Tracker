# ---------------------------
# 🌐 frontend/nginx.conf (production optimisée)
# ---------------------------

# Gzip compression
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

server {
    listen 80;
    server_name _;
    
    client_max_body_size 20m;
    root /usr/share/nginx/html;
    index index.html;
    
    # Logs
    access_log /var/log/nginx/frontend_access.log;
    error_log /var/log/nginx/frontend_error.log warn;
    
    # Sécurité basique
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # --- Assets statiques avec cache agressif ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Gestion 404 gracieuse pour assets
        try_files $uri =404;
    }
    
    # --- SPA avec fallback index.html ---
    location / {
        # Cache modéré pour pages HTML
        add_header Cache-Control "public, max-age=3600" always; # 1h
        
        try_files $uri $uri/ /index.html;
        
        # Gestion spéciale pour index.html (pas de cache agressif)
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }
    }
    
    # --- Pages d'erreur custom ---
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

